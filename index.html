<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ownerka.Бджоляр</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFC107">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { 
            --primary: #FFC107; --primary-dark: #FFA000;
            --bg: #f8f9fa; --text: #2c3e50; --card: #ffffff; 
            --danger: #d32f2f; --success: #388e3c; --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.6; font-size: 16px; }
        .wrapper { max-width: 1200px; margin: 0 auto; padding-bottom: 80px; }

        header { background: var(--primary); padding: 20px; text-align: center; font-weight: 800; font-size: 1.5rem; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; }
        #offline-indicator { display: none; background: var(--danger); color: white; text-align: center; font-size: 0.9rem; padding: 5px; }
        .container { padding: 20px; }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h2 { margin-bottom: 20px; font-size: 1.8rem; border-bottom: 3px solid var(--primary); display: inline-block; }

        .grid-list { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: var(--shadow); border-top: 6px solid var(--primary); display: flex; flex-direction: column; justify-content: space-between; }
        .card.alert { border-top-color: var(--danger); background-color: #fff5f5; }
        .card.history { border-top-color: #95a5a6; opacity: 0.8; }
        
        .card h3 { font-size: 1.3rem; margin-bottom: 10px; color: #1a1a1a; display: flex; justify-content: space-between;}
        .card p { margin-bottom: 8px; font-size: 1rem; }
        .badge { background: #eee; padding: 4px 10px; border-radius: 6px; font-weight: bold; font-size: 0.9rem; display: inline-block; margin: 2px;}
        .badge-del { cursor: pointer; background: #ffebee; color: #c62828; border: 1px solid #ef9a9a;}

        /* Кнопки-планки */
        .bar-btn { background: #e3f2fd; border: 1px solid #90caf9; color: #1565c0; padding: 5px 12px; border-radius: 6px; font-weight: bold; font-size: 1rem; cursor: pointer; margin: 3px; transition: 0.2s; }
        .bar-btn:active { transform: scale(0.95); }
        .bar-btn.crossed { text-decoration: line-through; background: #f5f5f5; border-color: #e0e0e0; color: #9e9e9e; }

        .form-card { background: var(--card); padding: 25px; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 30px; max-width: 800px; margin-left: auto; margin-right: auto; border: 2px solid transparent;}
        .form-card.edit-mode { border-color: var(--primary); background: #fffdf5; }
        .form-grid { display: grid; gap: 15px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full-width { grid-column: 1 / -1; }

        label { font-size: 0.9rem; margin-bottom: 6px; font-weight: 600; color: #555; }
        input { padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1.1rem; transition: border-color 0.2s; width: 100%;}
        input:focus { border-color: var(--primary); outline: none; }

        button { background: var(--primary); color: #000; border: none; padding: 15px; border-radius: 8px; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: transform 0.1s, background 0.2s; }
        button:active { transform: scale(0.98); }
        
        .btn-action { padding: 8px 12px; font-size: 0.9rem; border-radius: 6px; margin-right: 5px; margin-top: 10px;}
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { background: transparent; border: 2px solid #ccc; color: #555; }

        /* Навигация */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; display: flex; justify-content: center; box-shadow: 0 -2px 15px rgba(0,0,0,0.1); padding-bottom: env(safe-area-inset-bottom); z-index: 1000; }
        .nav-content { width: 100%; max-width: 800px; display: flex; }
        .nav-btn { background: none; border: none; padding: 15px 0; font-size: 1rem; color: #7f8c8d; flex: 1; font-weight: 700; cursor: pointer; transition: color 0.2s; border-radius: 0;}
        .nav-btn.active { color: var(--primary-dark); border-top: 4px solid var(--primary); }
    </style>
</head>
<body>

<div id="offline-indicator">🔴 Режим работы без интернета.</div>

<header>🐝 OWNERKA: Бджоляр</header>

<div class="wrapper">
    <div class="container">
        <div id="tab-events" class="tab-content active">
            <h2>🚨 События (Сегодня/Завтра)</h2>
            <div id="events-list" class="grid-list">Загрузка...</div>
        </div>

        <div id="tab-add" class="tab-content">
            <div class="form-card" id="main-form-card">
                <h2 id="form-title" style="border: none; margin-bottom: 15px;">Новая партия</h2>
                <form id="add-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Дата прививки (можно менять)</label>
                            <input type="date" id="input-date" required>
                        </div>
                        <div class="form-group">
                            <label>Линия</label>
                            <input type="text" id="input-lineage" value="B-" required>
                        </div>
                        <div class="form-group">
                            <label>Семья (любой номер)</label>
                            <input type="number" id="input-family" min="1" required>
                        </div>
                        <div class="form-group">
                            <label>Количество (шт)</label>
                            <input type="number" id="input-pieces" min="1" required>
                        </div>
                        
                        <div class="form-group full-width">
                            <label>Планки (введи номер и нажми +)</label>
                            <div style="display: flex; gap: 10px;">
                                <input type="text" id="input-bar-add" placeholder="Например: 1" style="flex: 1;">
                                <button type="button" onclick="window.addBar()" style="width: auto; padding: 0 20px; font-size: 1.5rem;">+</button>
                            </div>
                            <div id="bar-tags-container" style="margin-top: 10px;"></div>
                        </div>

                        <div class="form-group full-width">
                            <label>Комментарий</label>
                            <input type="text" id="input-comment" placeholder="Особенности...">
                        </div>
                    </div>
                    <div style="display: flex; gap: 10px; margin-top: 20px;">
                        <button type="submit" id="submit-btn" style="flex: 1;">ДОБАВИТЬ В ЖУРНАЛ</button>
                        <button type="button" id="cancel-edit-btn" class="btn-outline" style="display: none;" onclick="window.cancelEdit()">ОТМЕНА</button>
                    </div>
                </form>
            </div>
            
            <h2 style="margin-top: 20px;">Активные маточники</h2>
            <div id="active-list" class="grid-list">Загрузка...</div>
        </div>

        <div id="tab-history" class="tab-content">
            <h2>📜 Архив закладок</h2>
            <div id="history-list" class="grid-list">Загрузка...</div>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-content">
        <button class="nav-btn active" onclick="switchTab('events', this)">СОБЫТИЯ</button>
        <button class="nav-btn" onclick="switchTab('add', this)">ЗАПИСИ</button>
        <button class="nav-btn" onclick="switchTab('history', this)">ИСТОРИЯ</button>
    </div>
</nav>

<script type="module" src="app.js"></script>
<script>
    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tabId).classList.add('active');
        btn.classList.add('active');
        window.scrollTo(0, 0);
    }
    document.getElementById('input-date').valueAsDate = new Date();
</script>
</body>
</html>
