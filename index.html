<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Бджоляр</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0F0F0F">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --honey: #F5A623;
            --honey-dark: #C8841A;
            --bg: #0F0F0F;
            --bg2: #1A1A1A;
            --bg3: #242424;
            --surface: #1E1E1E;
            --border: #2A2A2A;
            --text: #F0EDE8;
            --text-muted: #6A6560;
            --danger: #FF4D4D;
            --danger-bg: rgba(255,77,77,0.1);
            --success: #4CAF82;
            --family-bg: rgba(76,175,130,0.13);
            --family-text: #6DD5A5;
            --family-border: rgba(76,175,130,0.28);
            --bar-bg: rgba(100,160,255,0.13);
            --bar-text: #7DB8FF;
            --bar-border: rgba(100,160,255,0.28);
            --nav-h: 72px;
            --header-h: 60px;
            --sidebar-w: 230px;
            --fab-size: 52px;
            --radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Golos Text', sans-serif;
            font-size: 15px;
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* ══════ MOBILE HEADER ══════ */
        .mobile-header {
            height: var(--header-h);
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 200;
        }
        .header-inner { display: flex; align-items: center; gap: 9px; }
        .header-bee {
            font-size: 1.5rem;
            filter: drop-shadow(0 0 10px rgba(245,166,35,0.7));
            animation: beeBob 3s ease-in-out infinite;
        }
        @keyframes beeBob {
            0%,100% { transform: translateY(0) rotate(-6deg); }
            50% { transform: translateY(-3px) rotate(6deg); }
        }
        .header-title {
            font-family: 'Unbounded', sans-serif;
            font-size: 0.95rem;
            font-weight: 900;
            letter-spacing: 0.08em;
            color: var(--honey);
        }

        /* ══════ SWIPE TABS (mobile) ══════ */
        .tabs-viewport { overflow: hidden; position: relative; }
        .tabs-track {
            display: flex;
            width: 300%;
            transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform;
        }
        .tab-pane {
            width: calc(100% / 3);
            min-height: calc(100dvh - var(--header-h) - var(--nav-h));
            padding: 18px 14px calc(var(--fab-size) + 88px);
            flex-shrink: 0;
        }

        /* ══════ BOTTOM NAV (mobile) ══════ */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: var(--nav-h);
            background: var(--bg2);
            border-top: 1px solid var(--border);
            display: flex;
            z-index: 400;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }
        .nav-btn {
            flex: 1;
            background: none; border: none;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 4px;
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.2s;
            position: relative;
        }
        .nav-btn.active { color: var(--honey); }
        .nav-icon { font-size: 1.25rem; transition: transform 0.2s; }
        .nav-btn.active .nav-icon { transform: scale(1.18); }
        .nav-label {
            font-family: 'Unbounded', sans-serif;
            font-size: 0.52rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .nav-dot {
            position: absolute;
            top: 9px; right: calc(50% - 18px);
            width: 7px; height: 7px;
            background: var(--danger);
            border-radius: 50%;
            border: 2px solid var(--bg2);
            display: none;
        }
        .nav-dot.visible { display: block; }

        /* ══════ FAB ══════ */
        .fab {
            position: fixed;
            bottom: calc(var(--nav-h) + 14px);
            right: 18px;
            z-index: 450;
            width: var(--fab-size);
            height: var(--fab-size);
            background: var(--honey);
            color: #000;
            border: none;
            border-radius: 50%;
            font-size: 1.7rem;
            font-weight: 900;
            line-height: 1;
            cursor: pointer;
            box-shadow: 0 4px 22px rgba(245,166,35,0.55), 0 2px 8px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), background 0.2s, box-shadow 0.2s;
            user-select: none;
            -webkit-user-select: none;
        }
        .fab:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(245,166,35,0.7), 0 2px 8px rgba(0,0,0,0.5);
        }
        .fab:active { transform: scale(0.92); }
        .fab.is-open {
            transform: rotate(45deg);
            background: var(--bg3);
            color: var(--text);
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }

        /* ══════ CARDS ══════ */
        .section-title {
            font-family: 'Unbounded', sans-serif;
            font-size: 0.7rem; font-weight: 700;
            letter-spacing: 0.12em; text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 14px;
            display: flex; align-items: center; gap: 8px;
        }
        .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .grid-list {
            display: grid;
            gap: 11px;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        }
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .card:active { transform: scale(0.985); }
        .card-accent { height: 3px; background: var(--honey); }
        .card.alert { border-color: rgba(255,77,77,0.22); }
        .card.alert .card-accent { background: linear-gradient(90deg, var(--danger), #FF8C00); }
        .card.history { opacity: 0.6; transition: opacity 0.2s; }
        .card.history:hover { opacity: 1; }
        .card.history .card-accent { background: #333; }
        .card-body { padding: 14px 15px; }
        .card-name {
            font-family: 'Unbounded', sans-serif;
            font-size: 1.05rem; font-weight: 700;
            color: var(--honey); margin-bottom: 11px;
        }
        .card-row {
            display: flex; align-items: flex-start;
            gap: 7px; margin-bottom: 7px; font-size: 0.88rem;
        }
        .card-row-label {
            color: var(--text-muted);
            min-width: 55px; padding-top: 2px;
            font-size: 0.76rem; flex-shrink: 0;
        }
        .card-row-val { flex: 1; }
        .tags-wrap { display: flex; flex-wrap: wrap; gap: 4px; }
        .btn-tag {
            border: 1px solid; padding: 3px 9px;
            border-radius: 20px; font-weight: 600; font-size: 0.8rem;
            cursor: pointer; transition: all 0.15s;
            font-family: 'Golos Text', sans-serif;
        }
        .btn-tag:active { transform: scale(0.9); }
        .btn-tag.crossed {
            text-decoration: line-through;
            background: rgba(255,255,255,0.03) !important;
            border-color: #2E2E2E !important; color: #3A3A3A !important;
        }
        .bar-btn { background: var(--bar-bg); border-color: var(--bar-border); color: var(--bar-text); }
        .family-btn { background: var(--family-bg); border-color: var(--family-border); color: var(--family-text); }
        .card-dates {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 7px; margin-top: 11px;
        }
        .date-chip { background: var(--bg3); border-radius: 10px; padding: 7px 9px; text-align: center; }
        .date-chip-label { font-size: 0.67rem; color: var(--text-muted); margin-bottom: 1px; }
        .date-chip-val { font-weight: 600; font-size: 0.87rem; }
        .date-chip.overdue .date-chip-val { color: var(--danger); }
        .date-chip.soon .date-chip-val { color: var(--honey); }
        .card-pieces {
            display: inline-flex; align-items: center; gap: 4px;
            background: var(--bg3); border-radius: 8px;
            padding: 3px 9px; font-size: 0.83rem; font-weight: 600;
        }
        .card-pieces.missing { color: var(--danger); }
        .card-comment {
            margin-top: 9px; font-size: 0.78rem; color: var(--text-muted);
            background: var(--bg3); border-radius: 8px;
            padding: 7px 10px; border-left: 2px solid var(--honey); font-style: italic;
        }
        .card-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-top: 11px; }
        .btn-action {
            padding: 9px; border-radius: 9px; border: none;
            font-weight: 700; font-size: 0.78rem; cursor: pointer;
            font-family: 'Golos Text', sans-serif;
            transition: opacity 0.15s, transform 0.1s;
        }
        .btn-action:active { transform: scale(0.95); }
        .btn-edit { background: rgba(100,160,255,0.12); color: var(--bar-text); border: 1px solid var(--bar-border); }
        .btn-danger { background: var(--danger-bg); color: var(--danger); border: 1px solid rgba(255,77,77,0.18); }

        /* Empty & shimmer */
        .empty-state { text-align: center; padding: 50px 20px; color: var(--text-muted); grid-column: 1/-1; }
        .empty-state-icon { font-size: 2.5rem; margin-bottom: 10px; opacity: 0.3; }
        .empty-state-text { font-size: 0.88rem; }
        .loading-shimmer {
            background: linear-gradient(90deg, var(--surface) 25%, var(--bg3) 50%, var(--surface) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--radius); height: 130px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ══════ SHEET OVERLAY ══════ */
        .sheet-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.72);
            z-index: 500;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .sheet-overlay.open { opacity: 1; pointer-events: all; }

        /* ══════ BOTTOM SHEET (mobile) ══════ */
        .bottom-sheet {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--bg2);
            border-radius: 22px 22px 0 0;
            z-index: 600;
            transform: translateY(105%);
            transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 93dvh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            will-change: transform;
        }
        .bottom-sheet.open { transform: translateY(0); }

        .sheet-handle {
            width: 36px; height: 4px;
            background: var(--border); border-radius: 2px;
            margin: 13px auto 0;
        }
        .sheet-header {
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 14px 20px 6px;
            position: sticky; top: 0;
            background: var(--bg2); z-index: 1;
        }
        .sheet-title {
            font-family: 'Unbounded', sans-serif;
            font-size: 0.88rem; font-weight: 700; color: var(--honey);
        }
        .sheet-close {
            background: var(--bg3); border: none; color: var(--text-muted);
            width: 28px; height: 28px; border-radius: 50%;
            cursor: pointer; font-size: 0.9rem;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        .sheet-close:hover { background: var(--border); }

        /* ══════ FORM ══════ */
        .form-body { padding: 6px 18px 36px; }
        .form-section { margin-bottom: 18px; }
        .form-label {
            font-size: 0.72rem; font-weight: 600;
            letter-spacing: 0.08em; text-transform: uppercase;
            color: var(--text-muted); margin-bottom: 7px; display: block;
        }
        .form-input {
            width: 100%; background: var(--bg3);
            border: 1.5px solid var(--border); border-radius: 11px;
            padding: 12px 13px; font-size: 0.97rem;
            color: var(--text); font-family: 'Golos Text', sans-serif;
            transition: border-color 0.2s;
            -webkit-appearance: none; appearance: none;
        }
        .form-input:focus { outline: none; border-color: var(--honey); }
        .form-input::placeholder { color: var(--text-muted); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; margin-bottom: 18px; }
        .form-row .form-section { margin: 0; }
        .tag-input-row { display: flex; gap: 7px; }
        .tag-input-row .form-input { flex: 1; }
        .btn-add-tag {
            background: var(--honey); color: #000; border: none;
            width: 46px; border-radius: 11px;
            font-size: 1.3rem; font-weight: 700; cursor: pointer;
            flex-shrink: 0; transition: background 0.15s, transform 0.1s;
        }
        .btn-add-tag:active { transform: scale(0.92); }
        .tags-container { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
        .badge-del {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 4px 9px; border-radius: 20px;
            font-weight: 600; font-size: 0.8rem;
            cursor: pointer; border: 1px solid;
            transition: opacity 0.15s;
        }
        .badge-del:active { opacity: 0.55; }
        .badge-bar { background: var(--bar-bg); color: var(--bar-text); border-color: var(--bar-border); }
        .badge-family { background: var(--family-bg); color: var(--family-text); border-color: var(--family-border); }
        .form-actions { display: grid; grid-template-columns: 1fr; gap: 9px; margin-top: 22px; }
        .form-actions.has-cancel { grid-template-columns: 1fr 1fr; }
        .btn-submit {
            background: var(--honey); color: #000; border: none;
            padding: 14px; border-radius: 11px;
            font-family: 'Unbounded', sans-serif; font-size: 0.75rem; font-weight: 700;
            cursor: pointer; letter-spacing: 0.05em;
            transition: opacity 0.15s, transform 0.1s;
        }
        .btn-submit:active { transform: scale(0.97); }
        .btn-cancel-form {
            background: var(--bg3); color: var(--text-muted);
            border: 1px solid var(--border); padding: 14px; border-radius: 11px;
            font-family: 'Unbounded', sans-serif; font-size: 0.75rem; font-weight: 700; cursor: pointer;
        }

        /* ══════ TOAST ══════ */
        .toast {
            position: fixed;
            bottom: calc(var(--nav-h) + var(--fab-size) + 26px);
            left: 50%;
            transform: translateX(-50%) translateY(16px);
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; padding: 9px 16px;
            font-size: 0.83rem; font-weight: 600;
            z-index: 1000; opacity: 0;
            transition: all 0.28s; white-space: nowrap; pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.success { border-color: var(--success); color: var(--success); }
        .toast.error { border-color: var(--danger); color: var(--danger); }

        /* swipe hint */
        .swipe-hint {
            text-align: center; color: var(--text-muted);
            font-size: 0.7rem; padding: 5px 0 2px;
            opacity: 0; animation: fadeHint 5s ease forwards;
        }
        @keyframes fadeHint {
            0%,100% { opacity: 0; }
            20%,80% { opacity: 0.55; }
        }

        /* ══════════════════════════════════════
           DESKTOP (≥ 800px)
        ══════════════════════════════════════ */
        .desktop-sidebar { display: none; }
        .desktop-main { display: none; }

        @media (min-width: 800px) {
            body { display: flex; height: 100dvh; overflow: hidden; }

            /* hide mobile-only */
            .mobile-header { display: none; }
            .bottom-nav { display: none; }
            .tabs-viewport { display: none; }
            .swipe-hint { display: none; }
            /* FAB hidden on desktop (sidebar button instead) */
            .fab { display: none; }

            /* ── Sidebar ── */
            .desktop-sidebar {
                display: flex;
                flex-direction: column;
                width: var(--sidebar-w);
                background: var(--bg2);
                border-right: 1px solid var(--border);
                flex-shrink: 0;
                height: 100dvh;
            }
            .sidebar-logo {
                padding: 22px 18px 18px;
                display: flex; align-items: center; gap: 10px;
                border-bottom: 1px solid var(--border);
            }
            .sidebar-bee {
                font-size: 1.6rem;
                filter: drop-shadow(0 0 10px rgba(245,166,35,0.7));
                animation: beeBob 3s ease-in-out infinite;
            }
            .sidebar-title {
                font-family: 'Unbounded', sans-serif;
                font-size: 0.75rem; font-weight: 900;
                letter-spacing: 0.07em; color: var(--honey);
                line-height: 1.4;
            }
            .sidebar-nav {
                flex: 1; padding: 14px 10px;
                display: flex; flex-direction: column; gap: 3px;
            }
            .sidebar-item {
                display: flex; align-items: center; gap: 10px;
                padding: 11px 12px; border-radius: 11px;
                cursor: pointer; color: var(--text-muted);
                font-weight: 600; font-size: 0.88rem;
                border: none; background: none; width: 100%;
                text-align: left;
                transition: background 0.18s, color 0.18s;
                position: relative;
            }
            .sidebar-item:hover { background: var(--bg3); color: var(--text); }
            .sidebar-item.active { background: rgba(245,166,35,0.1); color: var(--honey); }
            .sidebar-item-icon { font-size: 1.1rem; }
            .sidebar-item-badge {
                margin-left: auto;
                background: var(--danger);
                border-radius: 20px;
                font-size: 0.65rem; font-weight: 700;
                padding: 1px 7px;
                color: #fff;
                display: none;
            }
            .sidebar-item-badge.visible { display: block; }
            .sidebar-fab-wrap {
                padding: 0 10px 20px;
            }
            .sidebar-fab-btn {
                width: 100%;
                background: var(--honey); color: #000;
                border: none; padding: 12px 16px;
                border-radius: 12px;
                font-family: 'Unbounded', sans-serif;
                font-size: 0.7rem; font-weight: 700;
                cursor: pointer;
                display: flex; align-items: center;
                justify-content: center; gap: 8px;
                letter-spacing: 0.04em;
                box-shadow: 0 4px 18px rgba(245,166,35,0.35);
                transition: opacity 0.15s, transform 0.1s;
            }
            .sidebar-fab-btn:hover { opacity: 0.88; }
            .sidebar-fab-btn:active { transform: scale(0.97); }

            /* ── Main content ── */
            .desktop-main {
                display: block;
                flex: 1; overflow-y: auto;
                height: 100dvh;
                padding: 28px 28px 40px;
                -webkit-overflow-scrolling: touch;
            }
            .desktop-tab { display: none; }
            .desktop-tab.active { display: block; }

            /* ── Desktop modal (centered, not bottom sheet) ── */
            .bottom-sheet {
                bottom: auto; left: 50%; right: auto;
                top: 50%;
                transform: translate(-50%, -44%) scale(0.95);
                border-radius: 20px;
                width: min(520px, 94vw);
                max-height: 88dvh;
                opacity: 0;
                transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.25s;
            }
            .bottom-sheet.open {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            .sheet-handle { display: none; }

            /* Toast on desktop */
            .toast {
                bottom: 24px;
                left: calc(var(--sidebar-w) + 50%);
                transform: translateX(-50%) translateY(16px);
            }
            .toast.show { transform: translateX(-50%) translateY(0); }
        }

        @media (min-width: 1100px) {
            :root { --sidebar-w: 248px; }
            .desktop-main { padding: 32px 36px 40px; }
        }
    </style>
</head>
<body>

<!-- ── MOBILE HEADER ── -->
<header class="mobile-header">
    <div class="header-inner">
        <span class="header-bee">🐝</span>
        <span class="header-title">БДЖОЛЯР</span>
    </div>
</header>

<!-- ── DESKTOP SIDEBAR ── -->
<aside class="desktop-sidebar">
    <div class="sidebar-logo">
        <span class="sidebar-bee">🐝</span>
        <div class="sidebar-title">OWNERKA<br>БДЖОЛЯР</div>
    </div>
    <nav class="sidebar-nav">
        <button class="sidebar-item active" onclick="switchDesktop(0,this)">
            <span class="sidebar-item-icon">🚨</span>
            Події
            <span class="sidebar-item-badge" id="desktop-events-badge"></span>
        </button>
        <button class="sidebar-item" onclick="switchDesktop(1,this)">
            <span class="sidebar-item-icon">📋</span>
            Записи
        </button>
        <button class="sidebar-item" onclick="switchDesktop(2,this)">
            <span class="sidebar-item-icon">📜</span>
            Архів
        </button>
    </nav>
    <div class="sidebar-fab-wrap">
        <button class="sidebar-fab-btn" onclick="openSheet()">
            ＋ &nbsp;Нова партія
        </button>
    </div>
</aside>

<!-- ── DESKTOP MAIN ── -->
<main class="desktop-main">
    <div class="desktop-tab active" id="dtab-0">
        <p class="section-title">🚨 Термінові події</p>
        <div id="d-events-list" class="grid-list">
            <div class="loading-shimmer"></div>
            <div class="loading-shimmer"></div>
        </div>
    </div>
    <div class="desktop-tab" id="dtab-1">
        <p class="section-title">📋 Активні партії</p>
        <div id="d-active-list" class="grid-list">
            <div class="loading-shimmer"></div>
            <div class="loading-shimmer"></div>
        </div>
    </div>
    <div class="desktop-tab" id="dtab-2">
        <p class="section-title">📜 Архів</p>
        <div id="d-history-list" class="grid-list">
            <div class="loading-shimmer"></div>
        </div>
    </div>
</main>

<!-- ── MOBILE SWIPE TABS ── -->
<div class="tabs-viewport" id="tabs-viewport">
    <div class="tabs-track" id="tabs-track">
        <div class="tab-pane" id="tab-events">
            <p class="section-title">🚨 Термінові події</p>
            <div id="events-list" class="grid-list">
                <div class="loading-shimmer"></div>
                <div class="loading-shimmer"></div>
            </div>
        </div>
        <div class="tab-pane" id="tab-add">
            <p class="section-title">📋 Активні партії</p>
            <div id="active-list" class="grid-list">
                <div class="loading-shimmer"></div>
            </div>
        </div>
        <div class="tab-pane" id="tab-history">
            <p class="section-title">📜 Архів</p>
            <div id="history-list" class="grid-list">
                <div class="loading-shimmer"></div>
            </div>
        </div>
    </div>
</div>
<p class="swipe-hint">← свайп для переключення →</p>

<!-- ── FAB (mobile) ── -->
<button class="fab" id="fab" onclick="openSheet()" aria-label="Нова партія">＋</button>

<!-- Sheet Overlay -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>

<!-- Bottom Sheet / Modal -->
<div class="bottom-sheet" id="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
        <span class="sheet-title" id="sheet-title">🐝 Нова партія</span>
        <button class="sheet-close" onclick="closeSheet()">✕</button>
    </div>
    <div class="form-body">
        <form id="add-form">
            <div class="form-row">
                <div class="form-section">
                    <label class="form-label">Дата прищеплення</label>
                    <input class="form-input" type="date" id="input-date" required>
                </div>
                <div class="form-section">
                    <label class="form-label">Лінія</label>
                    <input class="form-input" type="text" id="input-lineage" value="B-" placeholder="B-1">
                </div>
            </div>
            <div class="form-section">
                <label class="form-label">Сімейства</label>
                <div class="tag-input-row">
                    <input class="form-input" type="number" id="input-family-val" placeholder="Номер сімейства">
                    <button type="button" class="btn-add-tag" onclick="window.addFamilyTag()">+</button>
                </div>
                <div class="tags-container" id="family-tags-container"></div>
            </div>
            <div class="form-section">
                <label class="form-label">Планки</label>
                <div class="tag-input-row">
                    <input class="form-input" type="text" id="input-bar-val" placeholder="Номер планки">
                    <button type="button" class="btn-add-tag" onclick="window.addBarTag()">+</button>
                </div>
                <div class="tags-container" id="bar-tags-container"></div>
            </div>
            <div class="form-row">
                <div class="form-section">
                    <label class="form-label">Кількість (шт)</label>
                    <input class="form-input" type="number" id="input-pieces" placeholder="0">
                </div>
                <div class="form-section">
                    <label class="form-label">Коментар</label>
                    <input class="form-input" type="text" id="input-comment" placeholder="...">
                </div>
            </div>
            <div class="form-actions" id="form-actions">
                <button type="submit" class="btn-submit" id="submit-btn">ЗБЕРЕГТИ</button>
                <button type="button" class="btn-cancel-form" id="cancel-edit-btn" style="display:none;" onclick="window.cancelEdit()">СКАСУВАТИ</button>
            </div>
        </form>
    </div>
</div>

<!-- Bottom Nav (mobile) -->
<nav class="bottom-nav">
    <button class="nav-btn active" onclick="switchTab(0,this)">
        <span class="nav-icon">🚨</span>
        <span class="nav-label">Події</span>
        <span class="nav-dot" id="events-dot"></span>
    </button>
    <button class="nav-btn" onclick="switchTab(1,this)">
        <span class="nav-icon">📋</span>
        <span class="nav-label">Записи</span>
    </button>
    <button class="nav-btn" onclick="switchTab(2,this)">
        <span class="nav-icon">📜</span>
        <span class="nav-label">Архів</span>
    </button>
</nav>

<div class="toast" id="toast"></div>

<script>
    // ── TOAST ──
    function showToast(msg, type='success') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = `toast ${type} show`;
        setTimeout(() => t.className = 'toast', 2800);
    }

    // ── MOBILE TABS ──
    let currentTab = 0;
    const track = document.getElementById('tabs-track');

    function switchTab(idx, btn) {
        currentTab = idx;
        track.style.transition = '';
        track.style.transform = `translateX(-${(idx/3)*100}%)`;
        document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', i === idx));
        window.scrollTo(0,0);
    }

    // Swipe gestures
    let txS=0, tyS=0, swiping=false;
    const vp = document.getElementById('tabs-viewport');
    vp.addEventListener('touchstart', e => {
        txS = e.touches[0].clientX; tyS = e.touches[0].clientY; swiping = false;
    }, {passive:true});
    vp.addEventListener('touchmove', e => {
        const dx = e.touches[0].clientX-txS, dy = e.touches[0].clientY-tyS;
        if (!swiping && Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>8) swiping = true;
        if (swiping) {
            const pct = (currentTab/3*100) - (dx/window.innerWidth*100/3);
            track.style.transition = 'none';
            track.style.transform = `translateX(-${Math.max(0,Math.min(pct,66.67))}%)`;
        }
    }, {passive:true});
    vp.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - txS;
        track.style.transition = '';
        if (swiping && Math.abs(dx)>48) {
            const next = Math.max(0, Math.min(2, currentTab+(dx<0?1:-1)));
            switchTab(next, document.querySelectorAll('.nav-btn')[next]);
        } else {
            switchTab(currentTab, document.querySelectorAll('.nav-btn')[currentTab]);
        }
        swiping = false;
    }, {passive:true});

    // ── DESKTOP TABS ──
    function switchDesktop(idx, btn) {
        document.querySelectorAll('.desktop-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
        document.querySelectorAll('.sidebar-item').forEach((b,i) => b.classList.toggle('active', i===idx));
    }

    // ── SHEET ──
    function openSheet(editMode=false) {
        document.getElementById('sheet-overlay').classList.add('open');
        document.getElementById('bottom-sheet').classList.add('open');
        const fab = document.getElementById('fab');
        if (fab) fab.classList.add('is-open');
        if (!editMode) document.getElementById('sheet-title').textContent = '🐝 Нова партія';
    }
    function closeSheet() {
        document.getElementById('sheet-overlay').classList.remove('open');
        document.getElementById('bottom-sheet').classList.remove('open');
        const fab = document.getElementById('fab');
        if (fab) fab.classList.remove('is-open');
        if (!document.getElementById('add-form').dataset.editId) {
            window.cancelEdit && window.cancelEdit();
        }
    }

    // Drag handle to dismiss (mobile)
    let shY=0, draggingSheet=false;
    const sh = document.getElementById('bottom-sheet');
    sh.addEventListener('touchstart', e => {
        if (e.target.closest('.sheet-handle, .sheet-header')) {
            shY = e.touches[0].clientY; draggingSheet = true;
        }
    }, {passive:true});
    sh.addEventListener('touchmove', e => {
        if (!draggingSheet) return;
        const dy = e.touches[0].clientY - shY;
        if (dy > 0) sh.style.transform = `translateY(${dy}px)`;
    }, {passive:true});
    sh.addEventListener('touchend', e => {
        if (!draggingSheet) return;
        const dy = e.changedTouches[0].clientY - shY;
        sh.style.transform = '';
        draggingSheet = false;
        if (dy > 90) closeSheet();
    }, {passive:true});

    document.addEventListener('keydown', e => { if(e.key==='Escape') closeSheet(); });

    document.getElementById('input-date').valueAsDate = new Date();
</script>

<script type="module" src="app.js"></script>
</body>
</html>
