<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Довідник</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0F0F0F">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script>
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    </script>

    <style>
        :root {
            --honey: #4CAF50;
            --honey-dark: #388E3C;
            --danger: #FF4D4D;
            --success: #4CAF82;
            --nav-h: 72px;
            --header-h: 60px;
            --sidebar-w: 230px;
            --fab-size: 52px;
            --radius: 16px;
            
            --bg: #0F0F0F;
            --bg2: #1A1A1A;
            --bg3: #242424;
            --surface: #1E1E1E;
            --border: #2A2A2A;
            --text: #F0EDE8;
            --text-muted: #6A6560;
            --danger-bg: rgba(255,77,77,0.1);
            --family-bg: rgba(76,175,130,0.13);
            --family-text: #6DD5A5;
            --family-border: rgba(76,175,130,0.28);
            --bar-bg: rgba(100,160,255,0.13);
            --bar-text: #7DB8FF;
            --bar-border: rgba(100,160,255,0.28);
        }

        html[data-theme="light"] {
            --bg: #F5F7FA;
            --bg2: #FFFFFF;
            --bg3: #EDF1F5;
            --surface: #FFFFFF;
            --border: #DDE2E8;
            --text: #2D3748;
            --text-muted: #718096;
            --danger-bg: rgba(255,77,77,0.1);
            --family-bg: rgba(76,175,130,0.15);
            --family-text: #2F855A;
            --family-border: rgba(76,175,130,0.3);
            --bar-bg: rgba(100,160,255,0.15);
            --bar-text: #2B6CB0;
            --bar-border: rgba(100,160,255,0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        /* Жесткий каркас PWA */
        html, body { height: 100%; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Golos Text', sans-serif;
            font-size: 15px;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Блокируем скролл самого body */
            transition: background 0.3s, color 0.3s;
        }

        .mobile-header {
            height: var(--header-h);
            flex-shrink: 0;
            background: var(--bg2);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            position: relative;
        }
        .header-inner { display: flex; align-items: center; gap: 9px; }
        .header-bee {
            font-size: 1.5rem;
            filter: drop-shadow(0 0 10px rgba(76,175,80,0.7));
            animation: beeBob 3s ease-in-out infinite;
        }
        @keyframes beeBob {
            0%,100% { transform: translateY(0) rotate(-6deg); }
            50% { transform: translateY(-3px) rotate(6deg); }
        }
        .header-title {
            font-family: 'Unbounded', sans-serif;
            font-size: 0.95rem;
            font-weight: 900;
            letter-spacing: 0.08em;
            color: var(--honey);
        }
        
        .theme-toggle {
            position: absolute;
            right: 18px;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text);
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s;
        }
        .theme-toggle:active { transform: scale(0.9); }

        .top-mode-tabs {
            flex-shrink: 0;
            display: flex;
            background: var(--bg2);
            padding: 12px 16px;
            gap: 10px;
            z-index: 190;
            border-bottom: 1px solid var(--border);
        }
        .mode-tab {
            flex: 1;
            padding: 12px;
            background: var(--bg3);
            border: 2px solid transparent;
            color: var(--text-muted);
            border-radius: 14px;
            font-family: 'Unbounded', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
        }
        .mode-tab.active {
            background: rgba(76,175,80,0.12);
            color: var(--honey);
            border-color: var(--honey);
            box-shadow: 0 4px 15px rgba(76,175,80,0.2);
            transform: translateY(-1px);
        }

        /* Нативный контейнер вкладок с независимым скроллом */
        .tabs-viewport { 
            flex: 1; 
            display: flex;
            overflow-x: auto; 
            overflow-y: hidden; 
            scroll-snap-type: x mandatory; 
            scroll-behavior: smooth; 
            scrollbar-width: none; 
            -webkit-overflow-scrolling: touch;
        }
        .tabs-viewport::-webkit-scrollbar { display: none; }
        
        .tab-pane {
            flex: 0 0 100vw; /* Занимает ровно один экран */
            width: 100vw;
            height: 100%;
            overflow-y: auto; /* Свой скролл для каждой вкладки */
            scroll-snap-align: start;
            scroll-snap-stop: always;
            padding: 18px 14px 40px; 
            -webkit-overflow-scrolling: touch;
        }

        .bottom-nav {
            flex-shrink: 0;
            height: var(--nav-h);
            background: var(--bg2);
            border-top: 1px solid var(--border);
            display: flex;
            z-index: 400;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }
        .nav-btn {
            flex: 1;
            background: none; border: none;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 4px;
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.2s;
            position: relative;
        }
        .nav-btn.active { color: var(--honey); }
        .nav-icon { font-size: 1.25rem; transition: transform 0.2s; }
        .nav-btn.active .nav-icon { transform: scale(1.18); }
        .nav-label {
            font-family: 'Unbounded', sans-serif;
            font-size: 0.52rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .nav-dot {
            position: absolute;
            top: 9px; right: calc(50% - 18px);
            width: 7px; height: 7px;
            background: var(--danger);
            border-radius: 50%;
            border: 2px solid var(--bg2);
            display: none;
        }
        .nav-dot.visible { display: block; }

        .fab {
            position: fixed;
            bottom: calc(var(--nav-h) + 14px + env(safe-area-inset-bottom, 0));
            right: 18px;
            z-index: 450;
            width: var(--fab-size);
            height: var(--fab-size);
            background: var(--honey);
            color: #000;
            border: none;
            border-radius: 50%;
            font-size: 1.7rem;
            font-weight: 900;
            line-height: 1;
            cursor: pointer;
            box-shadow: 0 4px 22px rgba(76,175,80,0.55), 0 2px 8px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), background 0.2s, box-shadow 0.2s;
            user-select: none;
            -webkit-user-select: none;
        }
        .fab:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(76,175,80,0.7), 0 2px 8px rgba(0,0,0,0.5);
        }
        .fab:active { transform: scale(0.92); }
        .fab.is-open {
            transform: rotate(45deg);
            background: var(--bg3);
            color: var(--text);
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }

        .section-title {
            font-family: 'Unbounded', sans-serif;
            font-size: 0.7rem; font-weight: 700;
            letter-spacing: 0.12em; text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 14px;
            display: flex; align-items: center; gap: 8px;
        }
        .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .grid-list {
            display: grid;
            gap: 11px;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        }
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .card.family-card { cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .card:active { transform: scale(0.985); }
        .card-accent { height: 3px; background: var(--honey); }
        .card.alert { border-color: rgba(255,77,77,0.22); }
        .card.alert .card-accent { background: linear-gradient(90deg, var(--danger), #FFC107); }
        .card.history { opacity: 0.6; transition: opacity 0.2s; }
        .card.history:hover { opacity: 1; }
        .card.history .card-accent { background: #333; }
        .card-body { padding: 14px 15px; }
        .card-name {
            font-family: 'Unbounded', sans-serif;
            font-size: 1.05rem; font-weight: 700;
            color: var(--honey); margin-bottom: 11px;
        }
        .card-row {
            display: flex; align-items: flex-start;
            gap: 7px; margin-bottom: 7px; font-size: 0.88rem;
        }
        .card-row-label {
            color: var(--text-muted);
            min-width: 55px; padding-top: 2px;
            font-size: 0.76rem; flex-shrink: 0;
        }
        .card-row-val { flex: 1; }
        .tags-wrap { display: flex; flex-wrap: wrap; gap: 4px; }
        .btn-tag {
            border: 1px solid; padding: 6px 14px;
            border-radius: 20px; font-weight: 600; font-size: 0.95rem;
            cursor: pointer; transition: all 0.15s;
            font-family: 'Golos Text', sans-serif;
        }
        .btn-tag:active { transform: scale(0.9); }
        .btn-tag.crossed {
            text-decoration: line-through;
            background: rgba(255,255,255,0.03) !important;
            border-color: #2E2E2E !important; color: #3A3A3A !important;
        }
        .bar-btn { background: var(--bar-bg); border-color: var(--bar-border); color: var(--bar-text); }
        .family-btn { background: var(--family-bg); border-color: var(--family-border); color: var(--family-text); }
        
        .card-dates {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 7px; margin-top: 11px;
        }
        .card-dates.single { grid-template-columns: 1fr; }
        .date-chip { 
            background: var(--bg3); 
            border-radius: 10px; 
            padding: 7px 9px; 
            text-align: center; 
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .date-chip-label { font-size: 0.67rem; color: var(--text-muted); margin-bottom: 1px; }
        .date-chip-val { font-weight: 600; font-size: 0.87rem; }
        
        .date-chip.soon { border-color: #FF9800; }
        .date-chip.soon .date-chip-val { color: #FF9800; }
        
        .date-chip.today { border-color: #F44336; }
        .date-chip.today .date-chip-val { color: #F44336; }
        
        .date-chip.overdue { border-color: #555; opacity: 0.55; }
        .date-chip.overdue .date-chip-val { color: #888; }
        
        .card-pieces {
            display: inline-flex; align-items: center; gap: 4px;
            background: var(--bg3); border-radius: 8px;
            padding: 3px 9px; font-size: 0.83rem; font-weight: 600;
        }
        .card-pieces.missing { color: var(--danger); }
        .card-comment {
            margin-top: 9px; font-size: 0.78rem; color: var(--text-muted);
            background: var(--bg3); border-radius: 8px;
            padding: 7px 10px; border-left: 2px solid var(--honey); font-style: italic;
        }
        .card-actions { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 11px; }
        .card-actions .btn-action { flex: 1; min-width: calc(50% - 7px); }
        .btn-action {
            padding: 9px; border-radius: 9px; border: none;
            font-weight: 700; font-size: 0.78rem; cursor: pointer;
            font-family: 'Golos Text', sans-serif;
            transition: opacity 0.15s, transform 0.1s;
        }
        .btn-action:active { transform: scale(0.95); }
        .btn-edit { background: rgba(100,160,255,0.12); color: var(--bar-text); border: 1px solid var(--bar-border); }
        .btn-danger { background: var(--danger-bg); color: var(--danger); border: 1px solid rgba(255,77,77,0.18); }
        .btn-success { background: rgba(76,175,130,0.15); color: var(--success); border: 1px solid rgba(76,175,130,0.3); }

        .family-history {
            display: none;
            margin-top: 12px;
            padding: 10px 12px;
            background: rgba(0,0,0,0.05);
            border-radius: 8px;
            border-left: 2px solid var(--honey);
            font-size: 0.82rem;
        }
        .family-history.show { display: block; }
        .history-item { color: var(--text-muted); margin-bottom: 5px; }
        .history-item:last-child { margin-bottom: 0; }

        .empty-state { text-align: center; padding: 50px 20px; color: var(--text-muted); grid-column: 1/-1; }
        .empty-state-icon { font-size: 2.5rem; margin-bottom: 10px; opacity: 0.3; }
        .empty-state-text { font-size: 0.88rem; }
        .loading-shimmer {
            background: linear-gradient(90deg, var(--surface) 25%, var(--bg3) 50%, var(--surface) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--radius); height: 130px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .sheet-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.72);
            z-index: 500;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .sheet-overlay.open { opacity: 1; pointer-events: all; }

        .bottom-sheet {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--bg2);
            border-radius: 22px 22px 0 0;
            z-index: 600;
            transform: translateY(105%);
            transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
            height: 93dvh;
            display: flex;
            flex-direction: column;
            will-change: transform;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.3);
        }
        .bottom-sheet.open.half { transform: translateY(45dvh); }
        .bottom-sheet.open.full { transform: translateY(0); }

        .sheet-handle-area {
            position: relative;
            padding-top: 13px;
            background: var(--bg2);
            border-radius: 22px 22px 0 0;
            z-index: 2;
        }
        .sheet-handle {
            width: 40px; height: 5px;
            background: var(--border); border-radius: 3px;
            margin: 0 auto;
        }
        .sheet-header {
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 14px 20px 6px;
            background: var(--bg2);
            touch-action: none; 
        }
        .sheet-title {
            font-family: 'Unbounded', sans-serif;
            font-size: 0.88rem; font-weight: 700; color: var(--honey);
        }
        .sheet-close {
            background: var(--bg3); border: none; color: var(--text-muted);
            width: 28px; height: 28px; border-radius: 50%;
            cursor: pointer; font-size: 0.9rem;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        .sheet-close:hover { background: var(--border); }

        .form-body { 
            padding: 6px 18px 36px; 
            overflow-y: auto; 
            flex: 1;
            -webkit-overflow-scrolling: touch;
        }
        .form-section { margin-bottom: 18px; }
        .form-label {
            font-size: 0.72rem; font-weight: 600;
            letter-spacing: 0.08em; text-transform: uppercase;
            color: var(--text-muted); margin-bottom: 7px; display: block;
        }
        .form-input {
            width: 100%; background: var(--bg3);
            border: 1.5px solid var(--border); border-radius: 11px;
            padding: 12px 13px; font-size: 0.97rem;
            color: var(--text); font-family: 'Golos Text', sans-serif;
            transition: border-color 0.2s;
            -webkit-appearance: none; appearance: none;
        }
        .form-input:focus { outline: none; border-color: var(--honey); }
        .form-input::placeholder { color: var(--text-muted); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; margin-bottom: 18px; }
        .form-row .form-section { margin: 0; }
        .tag-input-row { display: flex; gap: 7px; }
        .tag-input-row .form-input { flex: 1; }
        .btn-add-tag {
            background: var(--honey); color: #000; border: none;
            width: 46px; border-radius: 11px;
            font-size: 1.3rem; font-weight: 700; cursor: pointer;
            flex-shrink: 0; transition: background 0.15s, transform 0.1s;
        }
        .btn-add-tag:active { transform: scale(0.92); }
        .tags-container { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
        .badge-del {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 5px 12px; border-radius: 20px;
            font-weight: 600; font-size: 0.9rem;
            cursor: pointer; border: 1px solid;
            transition: opacity 0.15s;
        }
        .badge-del:active { opacity: 0.55; }
        .badge-bar { background: var(--bar-bg); color: var(--bar-text); border-color: var(--bar-border); }
        .badge-family { background: var(--family-bg); color: var(--family-text); border-color: var(--family-border); }

        .history-edit-row {
            display: flex; gap: 8px; margin-bottom: 8px;
        }
        .history-edit-row .form-input { flex: 1; }
        .btn-del-history {
            background: var(--danger-bg);
            color: var(--danger);
            border: 1px solid rgba(255,77,77,0.18);
            border-radius: 11px;
            width: 46px; font-weight: bold; font-size: 1.1rem; cursor: pointer;
        }

        .form-actions { display: grid; grid-template-columns: 1fr; gap: 9px; margin-top: 22px; }
        .form-actions.has-cancel { grid-template-columns: 1fr 1fr; }
        .form-actions.is-editing {
            grid-template-columns: 1fr 1fr;
            grid-template-areas: "save save" "del cancel";
        }
        .form-actions.is-editing .btn-submit { grid-area: save; }
        .form-actions.is-editing #delete-edit-btn { grid-area: del; }
        .form-actions.is-editing #cancel-edit-btn { grid-area: cancel; }

        .btn-submit {
            background: var(--honey); color: #000; border: none;
            padding: 14px; border-radius: 11px;
            font-family: 'Unbounded', sans-serif; font-size: 0.75rem; font-weight: 700;
            cursor: pointer; letter-spacing: 0.05em;
            transition: opacity 0.15s, transform 0.1s;
        }
        .btn-submit:active { transform: scale(0.97); }
        .btn-cancel-form {
            background: var(--bg3); color: var(--text-muted);
            border: 1px solid var(--border); padding: 14px; border-radius: 11px;
            font-family: 'Unbounded', sans-serif; font-size: 0.75rem; font-weight: 700; cursor: pointer;
        }
        .btn-delete-form {
            background: var(--danger-bg); color: var(--danger);
            border: 1px solid rgba(255,77,77,0.18); padding: 14px; border-radius: 11px;
            font-family: 'Unbounded', sans-serif; font-size: 0.75rem; font-weight: 700; cursor: pointer;
        }

        .desktop-sidebar { display: none; }
        .desktop-main { display: none; }

        @media (min-width: 800px) {
            body { 
                flex-direction: row; 
            }
            .mobile-header, .top-mode-tabs, .bottom-nav, .tabs-viewport, .fab { 
                display: none !important; 
            }

            .desktop-sidebar {
                display: flex;
                flex-direction: column;
                width: var(--sidebar-w);
                background: var(--bg2);
                border-right: 1px solid var(--border);
                flex-shrink: 0;
                height: 100dvh;
            }
            .sidebar-logo {
                padding: 22px 18px 18px;
                display: flex; align-items: center; gap: 10px;
                border-bottom: 1px solid var(--border);
            }
            .sidebar-bee {
                font-size: 1.6rem;
                filter: drop-shadow(0 0 10px rgba(76,175,80,0.7));
                animation: beeBob 3s ease-in-out infinite;
            }
            .sidebar-title {
                font-family: 'Unbounded', sans-serif;
                font-size: 0.75rem; font-weight: 900;
                letter-spacing: 0.07em; color: var(--honey);
                line-height: 1.4;
            }
            .sidebar-nav {
                flex: 1; padding: 14px 10px;
                display: flex; flex-direction: column; gap: 3px;
            }
            .sidebar-item {
                display: flex; align-items: center; gap: 10px;
                padding: 11px 12px; border-radius: 11px;
                cursor: pointer; color: var(--text-muted);
                font-weight: 600; font-size: 0.88rem;
                border: none; background: none; width: 100%;
                text-align: left;
                transition: background 0.18s, color 0.18s;
            }
            .sidebar-item:hover { background: var(--bg3); color: var(--text); }
            .sidebar-item.active { background: rgba(76,175,80,0.1); color: var(--honey); }
            .sidebar-item-icon { font-size: 1.1rem; }
            .sidebar-item-badge {
                margin-left: auto;
                background: var(--danger);
                border-radius: 20px;
                font-size: 0.65rem; font-weight: 700;
                padding: 1px 7px;
                color: #fff;
                display: none;
            }
            .sidebar-item-badge.visible { display: block; }
            .sidebar-fab-wrap {
                padding: 0 10px 20px;
            }
            .sidebar-fab-btn {
                width: 100%;
                background: var(--honey); color: #000;
                border: none; padding: 12px 16px;
                border-radius: 12px;
                font-family: 'Unbounded', sans-serif;
                font-size: 0.7rem; font-weight: 700;
                cursor: pointer;
                display: flex; align-items: center;
                justify-content: center; gap: 8px;
                letter-spacing: 0.04em;
                box-shadow: 0 4px 18px rgba(76,175,80,0.35);
                transition: opacity 0.15s, transform 0.1s;
            }
            .sidebar-fab-btn:hover { opacity: 0.88; }
            .sidebar-fab-btn:active { transform: scale(0.97); }

            .desktop-mode-tabs {
                display: flex;
                background: var(--bg2);
                padding: 12px 16px;
                gap: 10px;
                border-bottom: 1px solid var(--border);
            }

            .desktop-main {
                display: block;
                flex: 1; 
                height: 100dvh;
                overflow-y: auto; /* Скроллится только контентная часть */
                padding: 28px 28px 40px;
                -webkit-overflow-scrolling: touch;
            }
            .desktop-tab { display: none; }
            .desktop-tab.active { display: block; }

            .bottom-sheet {
                bottom: auto; left: 50%; right: auto;
                top: 50%;
                transform: translate(-50%, -44%) scale(0.95) !important;
                border-radius: 20px;
                width: min(520px, 94vw);
                height: auto;
                max-height: 88dvh;
                opacity: 0;
                pointer-events: none;
                transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.25s;
            }
            .bottom-sheet.open.half, .bottom-sheet.open.full {
                transform: translate(-50%, -50%) scale(1) !important;
                opacity: 1;
                pointer-events: all;
            }
            .sheet-handle-area { display: none; }
        }
    </style>
</head>
<body>

<header class="mobile-header">
    <div class="header-inner">
        <span class="header-bee">📖</span>

<aside class="desktop-sidebar">

    </div>
    <div class="desktop-mode-tabs">
        <button class="mode-tab active" data-mode="batches" onclick="window.setAppMode('batches')">МАТКИ</button>
        <button class="mode-tab" data-mode="families" onclick="window.setAppMode('families')">СІМ'Ї</button>
    </div>
    <nav class="sidebar-nav">
        <button class="sidebar-item active" onclick="window.switchDesktop(0,this)">
            <span class="sidebar-item-icon">🚨</span>
            Події
            <span class="sidebar-item-badge" id="desktop-events-badge"></span>
        </button>
        <button class="sidebar-item" onclick="window.switchDesktop(1,this)">
            <span class="sidebar-item-icon">📋</span>
            Записи
        </button>
        <button class="sidebar-item" onclick="window.switchDesktop(2,this)">
            <span class="sidebar-item-icon">📜</span>
            Архів
        </button>
    </nav>
    <div class="sidebar-fab-wrap">
        <button class="sidebar-fab-btn" onclick="window.openSheet()">
            ＋ &nbsp;Створити
        </button>
    </div>
</aside>

<main class="desktop-main">
    <div class="desktop-tab active" id="dtab-0">
        <p class="section-title">🚨 Термінові події</p>
        <div id="d-events-list" class="grid-list">
            <div class="loading-shimmer"></div>
            <div class="loading-shimmer"></div>
        </div>
    </div>
    <div class="desktop-tab" id="dtab-1">
        <p class="section-title">📋 Активні</p>
        <div id="d-active-list" class="grid-list">
            <div class="loading-shimmer"></div>
            <div class="loading-shimmer"></div>
        </div>
    </div>
    <div class="desktop-tab" id="dtab-2">
        <p class="section-title">📜 Архів</p>
        <div id="d-history-list" class="grid-list">
            <div class="loading-shimmer"></div>
        </div>
    </div>
</main>

<div class="tabs-viewport" id="tabs-viewport">
    <div class="tab-pane" id="tab-events">
        <p class="section-title">🚨 Термінові події</p>
        <div id="events-list" class="grid-list">
            <div class="loading-shimmer"></div>
            <div class="loading-shimmer"></div>
        </div>
    </div>
    <div class="tab-pane" id="tab-add">
        <p class="section-title">📋 Активні</p>
        <div id="active-list" class="grid-list">
            <div class="loading-shimmer"></div>
        </div>
    </div>
    <div class="tab-pane" id="tab-history">
        <p class="section-title">📜 Архів</p>
        <div id="history-list" class="grid-list">
            <div class="loading-shimmer"></div>
        </div>
    </div>
</div>

<button class="fab" id="fab" onclick="window.openSheet()" aria-label="Створити">＋</button>

<div class="sheet-overlay" id="sheet-overlay" onclick="window.closeSheet()"></div>

<div class="bottom-sheet" id="bottom-sheet">
    <div class="sheet-handle-area" id="sheet-handle-area">
        <div class="sheet-handle"></div>
    </div>
    <div class="sheet-header" id="sheet-header">
        <span class="sheet-title" id="sheet-title">📖 Нова партія</span>
        <button type="button" class="sheet-close" onclick="window.closeSheet()">✕</button>
    </div>
    <div class="form-body">
        <form id="add-form">
            <div id="form-batches-fields">
                <div class="form-row">
                    <div class="form-section">
                        <label class="form-label">Дата прищеплення</label>
                        <input class="form-input" type="date" id="input-date">
                    </div>
                    <div class="form-section">
                        <label class="form-label">Лінія</label>
                        <input class="form-input" type="text" id="input-lineage" value="B-" placeholder="B-1">
                    </div>
                </div>
                <div class="form-section">
                    <label class="form-label">Сімейства</label>
                    <div class="tag-input-row">
                        <input class="form-input" type="number" id="input-family-val" placeholder="Номер сімейства">

                    </div>
                    <div class="tags-container" id="family-tags-container"></div>

                <div class="form-section">
                    <label class="form-label">Планки</label>
                    <div class="tag-input-row">
                        <input class="form-input" type="text" id="input-bar-val" placeholder="Номер планки">
                        <button type="button" class="btn-add-tag" onclick="window.addBarTag(false)">+</button>
                    </div>
                    <div class="tags-container" id="bar-tags-container"></div>
                </div>
                <div class="form-row">
                    <div class="form-section">
                        <label class="form-label">Кількість (шт)</label>
                        <input class="form-input" type="number" id="input-pieces" placeholder="0">
                    </div>
                </div>
            </div>

            <div id="form-families-fields" style="display:none;">
                <div class="form-section">
                    <label class="form-label">Сімейства</label>
                    <div class="tag-input-row">
                        <input class="form-input" type="number" id="input-f-family-val" placeholder="Номер сімейства">
                        <button type="button" class="btn-add-tag" onclick="window.addFFamilyTag()">+</button>
                    </div>
                    <div class="tags-container" id="f-family-tags-container"></div>
                </div>
                <div class="form-row">
                    <div class="form-section">
                        <label class="form-label">Створено</label>
                        <input class="form-input" type="date" id="input-f-created" onchange="window.recalcNextCheck()">
                    </div>
                    <div class="form-section">
                        <label class="form-label">Наступна перевірка</label>
                        <input class="form-input" type="date" id="input-f-next">
                    </div>
                </div>
                <div class="form-section" id="f-history-section" style="display:none;">
                    <label class="form-label">Аудит перевірок</label>
                    <div id="f-history-list"></div>
                    <button type="button" class="btn-cancel-form" style="width:100%; padding: 10px; margin-top: 5px;" onclick="window.addHistoryInput()">+ Додати перевірку</button>
                </div>
            </div>

            <div class="form-section">
                <label class="form-label">Коментар</label>
                <input class="form-input" type="text" id="input-comment" placeholder="...">
            </div>
            
            <div class="form-actions" id="form-actions">
                <button type="submit" class="btn-submit" id="submit-btn">ЗБЕРЕГТИ</button>
                <button type="button" class="btn-delete-form" id="delete-edit-btn" style="display:none;" onclick="window.deleteFromEdit()">ВИДАЛИТИ</button>
                <button type="button" class="btn-cancel-form" id="cancel-edit-btn" style="display:none;" onclick="window.cancelEdit()">СКАСУВАТИ</button>
            </div>
        </form>
    </div>
</div>

<nav class="bottom-nav">
    <button class="nav-btn active" onclick="window.switchTab(0)">
        <span class="nav-icon">🚨</span>
        <span class="nav-label">Події</span>
        <span class="nav-dot" id="events-dot"></span>
    </button>
    <button class="nav-btn" onclick="window.switchTab(1)">
        <span class="nav-icon">📋</span>
        <span class="nav-label">Записи</span>
    </button>
    <button class="nav-btn" onclick="window.switchTab(2)">
        <span class="nav-icon">📜</span>
        <span class="nav-label">Архів</span>
    </button>
</nav>

<script>
    // Переключение темы
    window.toggleTheme = () => {
        const root = document.documentElement;
        const isLight = root.getAttribute('data-theme') === 'light';
        const next = isLight ? 'dark' : 'light';
        if (next === 'light') {
            root.setAttribute('data-theme', 'light');
        } else {
            root.removeAttribute('data-theme');
        }
        localStorage.setItem('theme', next);
    };

    let currentTab = 0;
    const vp = document.getElementById('tabs-viewport');
    let scrollTimeout;

    // Нативный скролл вкладок: сам определяет на какой мы странице и зажигает кнопку внизу
    vp.addEventListener('scroll', () => {
        clearTimeout(scrollTimeout);
        scrollTimeout = setTimeout(() => {
            const newIdx = Math.round(vp.scrollLeft / window.innerWidth);
            if (newIdx !== currentTab) {
                currentTab = newIdx;
                document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', i === currentTab));
            }
        }, 50);
    }, { passive: true });

    // Клик по кнопкам нижнего меню перематывает контейнер
    window.switchTab = (idx) => {
        currentTab = idx;
        vp.scrollTo({ left: idx * window.innerWidth, behavior: 'smooth' });
        document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', i === idx));
    };

    window.switchDesktop = (idx, btn) => {
        document.querySelectorAll('.desktop-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
        document.querySelectorAll('.sidebar-nav .sidebar-item').forEach((b,i) => b.classList.toggle('active', i===idx));
    };

    let sheetState = 0;

    window.openSheet = (editMode=false) => {
        if (!editMode) window.cancelEdit && window.cancelEdit();
        
        document.getElementById('sheet-overlay').classList.add('open');
        const sh = document.getElementById('bottom-sheet');
        sh.style.transition = 'transform 0.38s cubic-bezier(0.4, 0, 0.2, 1)';
        sh.classList.remove('full');
        sh.classList.add('open', 'half');
        sheetState = 1;
        
        const fab = document.getElementById('fab');
        if (fab) fab.classList.add('is-open');
        if (!editMode) {
            document.getElementById('sheet-title').textContent = window.appMode === 'batches' ? '📖 Нова партія' : '🏠 Нова сім\'я';
        }
    };
    
    window.closeSheet = () => {
        document.getElementById('sheet-overlay').classList.remove('open');
        const sh = document.getElementById('bottom-sheet');
        sh.style.transition = 'transform 0.38s cubic-bezier(0.4, 0, 0.2, 1)';
        sh.classList.remove('open', 'half', 'full');
        sheetState = 0;
        
        const fab = document.getElementById('fab');
        if (fab) fab.classList.remove('is-open');
        if (!document.getElementById('add-form')?.dataset.editId) {
            window.cancelEdit && window.cancelEdit();
        }
    };

    // Оптимизированные жесты шторки (слушатели включаются ТОЛЬКО при касании шапки)
    let shY = 0;
    const sh = document.getElementById('bottom-sheet');
    const dragArea1 = document.getElementById('sheet-handle-area');
    const dragArea2 = document.getElementById('sheet-header');

    const onTouchMove = e => {
        e.preventDefault(); 
        const dy = e.touches[0].clientY - shY;
        if (sheetState === 2 && dy > 0) {
            sh.style.transform = `translateY(${dy}px)`;
        } else if (sheetState === 1) {
            sh.style.transform = `translateY(calc(45dvh + ${dy}px))`;
        }
    };

    const onTouchEnd = e => {
        window.removeEventListener('touchmove', onTouchMove);
        window.removeEventListener('touchend', onTouchEnd);
        
        sh.style.transition = 'transform 0.38s cubic-bezier(0.4, 0, 0.2, 1)';
        sh.style.transform = ''; 
        
        const dy = e.changedTouches[0].clientY - shY;
        
        if (dy > 60) {
            if (sheetState === 2) {
                sh.classList.remove('full');
                sh.classList.add('half');
                sheetState = 1;
            } else if (sheetState === 1) {
                window.closeSheet();
            }
        } else if (dy < -60) {
            if (sheetState === 1) {
                sh.classList.remove('half');
                sh.classList.add('full');
                sheetState = 2;
            }
        }
    };

    const handleTouchStart = e => {
        shY = e.touches[0].clientY; 
        sh.style.transition = 'none'; 
        window.addEventListener('touchmove', onTouchMove, {passive:false});
        window.addEventListener('touchend', onTouchEnd, {passive:true});
    };

    dragArea1.addEventListener('touchstart', handleTouchStart, {passive:true});
    dragArea2.addEventListener('touchstart', handleTouchStart, {passive:true});

    document.addEventListener('keydown', e => { if(e.key==='Escape') window.closeSheet(); });

</script>

<script type="module" src="app.js"></script>
</body>
</html>
