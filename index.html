<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ownerka.Бджоляр</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFC107">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { 
            --primary: #FFC107; --primary-dark: #FFA000;
            --bg: #f8f9fa; --text: #2c3e50; --card: #ffffff; 
            --danger: #d32f2f; --success: #388e3c; --shadow: 0 4px 6px rgba(0,0,0,0.1);
            --family-bg: #e8f5e9; --family-text: #2e7d32; --family-border: #a5d6a7;
            --bar-bg: #e3f2fd; --bar-text: #1565c0; --bar-border: #90caf9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.6; font-size: 16px; padding-bottom: 100px; }
        .wrapper { max-width: 1200px; margin: 0 auto; }

        header { background: var(--primary); padding: 20px; text-align: center; font-weight: 800; font-size: 1.5rem; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; }
        .container { padding: 20px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        h2 { margin-bottom: 20px; font-size: 1.8rem; border-bottom: 3px solid var(--primary); display: inline-block; }
        .grid-list { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
        
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: var(--shadow); border-top: 6px solid var(--primary); position: relative; }
        .card.alert { border-top-color: var(--danger); background-color: #fff5f5; }
        .card.history { border-top-color: #bdc3c7; background-color: #fdfdfd; opacity: 0.9; }
        
        .card h3 { font-size: 1.3rem; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .card p { margin-bottom: 6px; font-size: 1rem; }

        /* Кнопки в карточках */
        .btn-tag { border: 1px solid; padding: 6px 14px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin: 4px; transition: 0.2s; }
        .btn-tag.crossed { text-decoration: line-through; background: #eee !important; border-color: #ccc !important; color: #999 !important; }
        
        .bar-btn { background: var(--bar-bg); border-color: var(--bar-border); color: var(--bar-text); }
        .family-btn { background: var(--family-bg); border-color: var(--family-border); color: var(--family-text); }

        /* Теги в форме */
        .badge-del { padding: 6px 12px; border-radius: 6px; font-weight: bold; display: inline-block; margin: 4px; cursor: pointer; border: 1px solid; }
        .badge-bar { background: #e3f2fd; color: #1565c0; border-color: #90caf9; }
        .badge-family { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }

        .form-card { background: var(--card); padding: 25px; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 30px; border: 2px solid transparent;}
        .form-card.edit-mode { border-color: var(--primary); background: #fffdf5; }
        
        .form-grid { display: grid; gap: 15px; grid-template-columns: 1fr 1fr; }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full-width { grid-column: 1 / -1; }

        label { font-size: 0.9rem; margin-bottom: 6px; font-weight: 600; color: #555; }
        input { padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1.1rem; width: 100%;}
        
        .input-row { display: flex; gap: 10px; }
        .btn-add-tag { background: #333; color: #fff; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.5rem;}

        .btn-main { background: var(--primary); color: #000; border: none; padding: 15px; border-radius: 8px; font-size: 1.1rem; font-weight: 800; cursor: pointer; width: 100%; margin-top: 15px;}
        .btn-secondary { background: #e0e0e0; color: #333; border: none; padding: 15px; border-radius: 8px; font-size: 1.1rem; font-weight: 800; cursor: pointer; width: 100%; margin-top: 15px;}
        
        .card-actions { margin-top: 15px; display: flex; gap: 10px; }
        .btn-action { padding: 10px; font-size: 0.8rem; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; flex: 1; }
        .btn-edit { background: #3498db; color: white; }
        .btn-danger { background: var(--danger); color: white; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; display: flex; box-shadow: 0 -2px 15px rgba(0,0,0,0.1); z-index: 1000; }
        .nav-btn { background: none; border: none; padding: 15px 0; font-size: 0.9rem; color: #7f8c8d; flex: 1; font-weight: 700; cursor: pointer; border-top: 4px solid transparent;}
        .nav-btn.active { color: var(--primary-dark); border-top-color: var(--primary); }
    </style>
</head>
<body>

<header>🐝 OWNERKA: Бджоляр</header>

<div class="wrapper container">
    <div id="tab-events" class="tab-content active">
        <h2>🚨 События</h2>
        <div id="events-list" class="grid-list">Загрузка...</div>
    </div>

    <div id="tab-add" class="tab-content">
        <div class="form-card" id="main-form-card">
            <h2 id="form-title" style="border: none; margin-bottom: 15px;">Новая партия</h2>
            <form id="add-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Дата прививки</label>
                        <input type="date" id="input-date" required>
                    </div>
                    <div class="form-group">
                        <label>Линия</label>
                        <input type="text" id="input-lineage" value="B-">
                    </div>
                    
                    <div class="form-group full-width">
                        <label>Семьи (+)</label>
                        <div class="input-row">
                            <input type="number" id="input-family-val" placeholder="Номер семьи">
                            <button type="button" class="btn-add-tag" onclick="window.addFamilyTag()">+</button>
                        </div>
                        <div id="family-tags-container" style="margin-top: 8px;"></div>
                    </div>

                    <div class="form-group full-width">
                        <label>Планки (+)</label>
                        <div class="input-row">
                            <input type="text" id="input-bar-val" placeholder="Номер планки">
                            <button type="button" class="btn-add-tag" onclick="window.addBarTag()">+</button>
                        </div>
                        <div id="bar-tags-container" style="margin-top: 8px;"></div>
                    </div>

                    <div class="form-group">
                        <label>Кол-во (шт)</label>
                        <input type="number" id="input-pieces">
                    </div>
                    <div class="form-group">
                        <label>Комментарий</label>
                        <input type="text" id="input-comment">
                    </div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" id="submit-btn" class="btn-main">СОХРАНИТЬ</button>
                    <button type="button" id="cancel-edit-btn" class="btn-secondary" style="display: none;" onclick="window.cancelEdit()">ОТМЕНА</button>
                </div>
            </form>
        </div>
        <div id="active-list" class="grid-list"></div>
    </div>

    <div id="tab-history" class="tab-content">
        <h2>📜 Архив</h2>
        <div id="history-list" class="grid-list"></div>
    </div>
</div>

<nav class="bottom-nav">
    <button class="nav-btn active" onclick="switchTab('events', this)">СОБЫТИЯ</button>
    <button class="nav-btn" onclick="switchTab('add', this)">ЗАПИСИ</button>
    <button class="nav-btn" onclick="switchTab('history', this)">ИСТОРИЯ</button>
</nav>

<script type="module" src="app.js"></script>
<script>
    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tabId).classList.add('active');
        btn.classList.add('active');
        window.scrollTo(0, 0);
    }
    document.getElementById('input-date').valueAsDate = new Date();
</script>
</body>
